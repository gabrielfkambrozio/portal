<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Restaurantes</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/portal_storage.js') }}"></script>

<style>

.lista{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(320px,1fr));

gap:20px;

margin-top:30px;

}

.cardRestaurante{

background:rgba(255,255,255,.08);

border-radius:16px;

padding:20px;

border:1px solid rgba(255,255,255,.08);

color:white;

}

.cardRestaurante h2{

margin-bottom:15px;

font-size:22px;

}

.cardRestaurante p{

margin:6px 0;

font-size:15px;

}

.acoes{

display:flex;

gap:10px;

margin-top:18px;

}

.acoes button{

flex:1;

}

</style>

</head>

<body class="login">

<div class="overlay">

<div class="glass" style="width:1200px;max-width:95%;">

<img
class="logo"
src="{{ url_for('static', filename='img/logo.svg') }}">

<div class="portal">

PORTAL

</div>

<h1>

Restaurantes

</h1>

<p>

Lugares especiais que vocês conheceram.

</p>

<div style="display:flex;justify-content:space-between;gap:15px;">

<button
onclick="window.location='/dashboard/{{ usuario|lower }}'"
style="background:#444;color:white;">

Dashboard

</button>

<button
onclick="window.location='/novo-restaurante/{{ usuario|lower }}'">

Novo Restaurante

</button>

</div>

<div
class="lista"
id="lista">

</div>

</div>

</div>

<script>

const usuario="{{ usuario|lower }}";

function carregar(){

const lista=document.getElementById("lista");

lista.innerHTML="";

const restaurantes=PortalStorage.listar("restaurantes");

if(restaurantes.length===0){

lista.innerHTML="<p style='color:white'>Nenhum restaurante cadastrado.</p>";

return;

}

restaurantes.forEach(r=>{

const card=document.createElement("div");

card.className="cardRestaurante";

card.innerHTML=`

<h2>${r.nome}</h2>

<p><strong>Cidade:</strong> ${r.cidade}</p>

<p><strong>Tipo:</strong> ${r.tipo}</p>

<p><strong>Data:</strong> ${r.data}</p>

<p><strong>Nota:</strong> ${r.nota}</p>

<p><strong>Valor:</strong> ${r.valor}</p>

<p>${r.observacoes||""}</p>

<div class="acoes">

<button onclick="editar(${r.id})">

Editar

</button>

<button
style="background:#a22;color:white;"
onclick="remover(${r.id})">

Excluir

</button>

</div>

`;

lista.appendChild(card);

});

}

function editar(id){

window.location=`/editar-restaurante/${id}/${usuario}`;

}

function remover(id){

if(!confirm("Deseja excluir este restaurante?")) return;

PortalStorage.remover("restaurantes",id);

carregar();

}

carregar();

</script>

</body>

</html>
