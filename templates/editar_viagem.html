<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Viagem</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/portal_storage.js') }}"></script>

</head>

<body class="login">

<div class="overlay">

<div class="glass">

<img
class="logo"
src="{{ url_for('static', filename='img/logo.svg') }}">

<div class="portal">

PORTAL

</div>

<h1>

Editar Viagem

</h1>

<p>

Atualize as informações da viagem

</p>

<form id="formEditar">

<input
type="text"
id="destino"
required>

<input
type="text"
id="cidade"
required>

<input
type="text"
id="pais"
required>

<div style="display:flex;gap:15px;">

<input
type="date"
id="inicio"
style="flex:1;"
required>

<input
type="date"
id="fim"
style="flex:1;"
required>

</div>

<input
type="number"
step="0.01"
id="valor">

<select id="status">

<option value="Planejada">Planejada</option>

<option value="Em andamento">Em andamento</option>

<option value="Concluída">Concluída</option>

</select>

<textarea
id="observacoes"
style="
height:140px;
resize:none;
padding:18px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
outline:none;
"></textarea>

<div style="display:flex;gap:15px;">

<button
type="button"
onclick="window.location='/viagens/{{ usuario|lower }}';"
style="flex:1;background:#444;color:white;">

Cancelar

</button>

<button
type="submit"
style="flex:2;">

Salvar Alterações

</button>

</div>

</form>

</div>

</div>

<script>

const id = {{ viagem.id }};

const viagem = PortalStorage.buscar("viagens", id);

if (viagem) {

document.getElementById("destino").value = viagem.destino || "";
document.getElementById("cidade").value = viagem.cidade || "";
document.getElementById("pais").value = viagem.pais || "";
document.getElementById("inicio").value = viagem.dataInicio || "";
document.getElementById("fim").value = viagem.dataFim || "";
document.getElementById("valor").value = viagem.valor || "";
document.getElementById("status").value = viagem.status || "Planejada";
document.getElementById("observacoes").value = viagem.observacoes || "";

}

document
.getElementById("formEditar")
.addEventListener("submit", function(e){

e.preventDefault();

PortalStorage.atualizar("viagens", id, {

destino: document.getElementById("destino").value,
cidade: document.getElementById("cidade").value,
pais: document.getElementById("pais").value,
dataInicio: document.getElementById("inicio").value,
dataFim: document.getElementById("fim").value,
valor: document.getElementById("valor").value,
status: document.getElementById("status").value,
observacoes: document.getElementById("observacoes").value

});

window.location="/viagens/{{ usuario|lower }}";

});

</script>

</body>

</html>
