<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova Viagem</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="login">

<div class="overlay">

<div class="glass">

<img
class="logo"
src="{{ url_for('static', filename='img/logo.svg') }}">

<div class="portal">

PORTAL

</div>

<h1>

Nova Viagem

</h1>

<p>

Cadastre uma nova experiência

</p>

<form action="/salvar-viagem/{{ usuario|lower }}" method="POST">

<input
type="text"
name="destino"
placeholder="Destino (Ex.: Disney, Torre Eiffel)"
required>

<input
type="text"
name="cidade"
placeholder="Cidade"
required>

<input
type="text"
name="pais"
placeholder="País"
required>

<div style="display:flex;gap:15px;">

<input
type="date"
name="inicio"
required
style="flex:1;">

<input
type="date"
name="fim"
required
style="flex:1;">

</div>

<input
type="number"
step="0.01"
name="valor"
placeholder="Valor previsto">

<select name="status">

<option value="Planejada">

Planejada

</option>

<option value="Em andamento">

Em andamento

</option>

<option value="Concluída">

Concluída

</option>

</select>

<textarea
name="observacoes"
placeholder="Observações..."
style="
height:140px;
resize:none;
padding:18px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
outline:none;
"></textarea>

<div style="display:flex;gap:15px;">

<button
type="button"
onclick="window.location='/viagens/{{ usuario|lower }}';"
style="flex:1;background:#444;color:white;">

Cancelar

</button>

<button
type="submit"
style="flex:2;">

Salvar Viagem

</button>

</div>

</form>

</div>

</div>

</body>

</html>
