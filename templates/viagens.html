<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Portal | Viagens</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="{{ url_for('static', filename='js/portal_storage.js') }}"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: radial-gradient(circle at top, #24152f, #09070d 70%);
      color: #f7eefc;
      min-height: 100vh;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 42px 24px;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 34px;
    }

    .topo h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -.04em;
    }

    .topo a {
      color: #d9b8ff;
      text-decoration: none;
      font-size: 14px;
    }

    .painel {
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      border-radius:28px;
      padding:28px;
      backdrop-filter:blur(18px);
      margin-bottom:28px;
    }

    .acoes{
      display:flex;
      justify-content:flex-end;
      margin-top:20px;
    }

    button{
      border:none;
      border-radius:16px;
      padding:14px 20px;
      cursor:pointer;
      background:linear-gradient(135deg,#b879ff,#ff8bd1);
      color:#150b1d;
      font-weight:700;
    }

    .lista{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .card{
      background:rgba(255,255,255,.08);
      border-radius:24px;
      padding:22px;
    }

    .meta{
      font-size:14px;
      color:#ddd;
      margin-top:10px;
    }

    .obs{
      margin-top:12px;
      white-space:pre-wrap;
    }

    .remover{
      margin-top:18px;
      width:100%;
    }

    @media(max-width:900px){
      .lista{
        grid-template-columns:1fr;
      }
    }
  </style>

</head>

<body>

<main class="container">

<div class="topo">

<h1>Viagens</h1>

<a href="/dashboard/{{ usuario|lower }}">

Voltar ao Dashboard

</a>

</div>

<div class="painel">

<div class="acoes">

<button onclick="window.location='/nova-viagem/{{ usuario|lower }}'">

Nova Viagem

</button>

</div>

</div>

<section
class="lista"
id="listaViagens">

</section>

</main>

<script>

const MODULO="viagens";

const lista=document.getElementById("listaViagens");

function formatar(data){

if(!data) return "-";

const p=data.split("-");

return `${p[2]}/${p[1]}/${p[0]}`;

}

function carregar(){

const viagens=PortalStorage.listar(MODULO);

lista.innerHTML="";

if(viagens.length===0){

lista.innerHTML="<p>Nenhuma viagem cadastrada.</p>";

return;

}

viagens.forEach(v=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<h2>${v.destino}</h2>

<div class="meta">

${formatar(v.dataInicio)} até ${formatar(v.dataFim)}

</div>

<div class="meta">

Hotel: ${v.hotel||"-"}

</div>

<div class="meta">

Transporte: ${v.transporte||"-"}

</div>

<div class="meta">

Status: ${v.status||"-"}

</div>

<div class="obs">

${v.observacoes||""}

</div>

<button
class="remover"
onclick="remover('${v.id}')">

Excluir

</button>

`;

lista.appendChild(card);

});

}

function remover(id){

PortalStorage.remover(MODULO,id);

carregar();

}

carregar();

</script>

</body>
</html>
