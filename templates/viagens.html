<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viagens</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<script src="{{ url_for('static', filename='js/portal_storage.js') }}"></script>

<style>

.lista{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(320px,1fr));

gap:20px;

margin-top:30px;

}

.cardViagem{

background:rgba(255,255,255,.08);

border-radius:16px;

padding:20px;

color:white;

border:1px solid rgba(255,255,255,.08);

}

.cardViagem h2{

margin-bottom:15px;

font-size:22px;

}

.cardViagem p{

margin:6px 0;

font-size:15px;

}

.acoes{

display:flex;

gap:10px;

margin-top:18px;

}

.acoes button{

flex:1;

}

</style>

</head>

<body class="login">

<div class="overlay">

<div class="glass" style="width:1200px;max-width:95%;">

<img
class="logo"
src="{{ url_for('static', filename='img/logo.svg') }}">

<div class="portal">

PORTAL

</div>

<h1>

Viagens

</h1>

<p>

Suas viagens cadastradas

</p>

<div style="display:flex;justify-content:space-between;gap:15px;">

<button
onclick="window.location='/dashboard/{{ usuario|lower }}'"
style="background:#444;color:white;">

Dashboard

</button>

<button
onclick="window.location='/nova-viagem/{{ usuario|lower }}'">

Nova Viagem

</button>

</div>

<div
class="lista"
id="lista">

</div>

</div>

</div>

<script>

const usuario="{{ usuario|lower }}";

function carregar(){

const lista=document.getElementById("lista");

lista.innerHTML="";

const viagens=PortalStorage.listar("viagens");

if(viagens.length===0){

lista.innerHTML="<p style='color:white'>Nenhuma viagem cadastrada.</p>";

return;

}

viagens.forEach(v=>{

const card=document.createElement("div");

card.className="cardViagem";

card.innerHTML=`

<h2>${v.destino}</h2>

<p><strong>Cidade:</strong> ${v.cidade}</p>

<p><strong>País:</strong> ${v.pais}</p>

<p><strong>Início:</strong> ${v.dataInicio}</p>

<p><strong>Fim:</strong> ${v.dataFim}</p>

<p><strong>Valor:</strong> ${v.valor}</p>

<p><strong>Status:</strong> ${v.status}</p>

<p>${v.observacoes||""}</p>

<div class="acoes">

<button onclick="editar(${v.id})">

Editar

</button>

<button
style="background:#a22;color:white;"
onclick="remover(${v.id})">

Excluir

</button>

</div>

`;

lista.appendChild(card);

});

}

function editar(id){

window.location=`/editar-viagem/${id}/${usuario}`;

}

function remover(id){

if(!confirm("Deseja excluir esta viagem?")) return;

PortalStorage.remover("viagens",id);

carregar();

}

carregar();

</script>

</body>

</html>
