<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Filme</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/portal_storage.js') }}"></script>

</head>

<body class="login">

<div class="overlay">

<div class="glass">

<img
class="logo"
src="{{ url_for('static', filename='img/logo.svg') }}">

<div class="portal">

PORTAL

</div>

<h1>

Editar Filme

</h1>

<p>

Atualize as informações do filme.

</p>

<form id="formEditar">

<input
type="text"
id="titulo"
required>

<input
type="text"
id="genero">

<div style="display:flex;gap:15px;">

<input
type="date"
id="data"
style="flex:1;">

<input
type="number"
id="nota"
min="0"
max="10"
step="0.5"
style="flex:1;">

</div>

<input
type="text"
id="duracao">

<textarea
id="observacoes"
style="
height:140px;
resize:none;
padding:18px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
outline:none;
"></textarea>

<div style="display:flex;gap:15px;">

<button
type="button"
onclick="window.location='/filmes/{{ usuario|lower }}';"
style="flex:1;background:#444;color:white;">

Cancelar

</button>

<button
type="submit"
style="flex:2;">

Salvar Alterações

</button>

</div>

</form>

</div>

</div>

<script>

const id = {{ filme.id }};

const filme = PortalStorage.buscar("filmes", id);

if(filme){

document.getElementById("titulo").value = filme.titulo || "";
document.getElementById("genero").value = filme.genero || "";
document.getElementById("data").value = filme.data || "";
document.getElementById("nota").value = filme.nota || "";
document.getElementById("duracao").value = filme.duracao || "";
document.getElementById("observacoes").value = filme.observacoes || "";

}

document
.getElementById("formEditar")
.addEventListener("submit",function(e){

e.preventDefault();

PortalStorage.atualizar("filmes",id,{

titulo:document.getElementById("titulo").value,

genero:document.getElementById("genero").value,

data:document.getElementById("data").value,

nota:document.getElementById("nota").value,

duracao:document.getElementById("duracao").value,

observacoes:document.getElementById("observacoes").value

});

window.location="/filmes/{{ usuario|lower }}";

});

</script>

</body>

</html>
