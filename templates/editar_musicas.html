<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Música</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/portal_storage.js') }}"></script>

</head>

<body class="login">

<div class="overlay">

<div class="glass">

<img
class="logo"
src="{{ url_for('static', filename='img/logo.svg') }}">

<div class="portal">

PORTAL

</div>

<h1>

Editar Música

</h1>

<p>

Atualize as informações da música.

</p>

<form id="formEditar">

<input
type="text"
id="titulo"
required>

<input
type="text"
id="artista"
required>

<input
type="text"
id="album">

<div style="display:flex;gap:15px;">

<input
type="text"
id="genero"
style="flex:1;">

<input
type="date"
id="data"
style="flex:1;">

</div>

<input
type="number"
id="nota"
min="0"
max="10"
step="0.5">

<textarea
id="observacoes"
style="
height:140px;
resize:none;
padding:18px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
outline:none;
"></textarea>

<div style="display:flex;gap:15px;">

<button
type="button"
onclick="window.location='/musicas/{{ usuario|lower }}';"
style="flex:1;background:#444;color:white;">

Cancelar

</button>

<button
type="submit"
style="flex:2;">

Salvar Alterações

</button>

</div>

</form>

</div>

</div>

<script>

const id={{ musica.id }};

const musica=PortalStorage.buscar("musicas",id);

if(musica){

document.getElementById("titulo").value=musica.titulo||"";
document.getElementById("artista").value=musica.artista||"";
document.getElementById("album").value=musica.album||"";
document.getElementById("genero").value=musica.genero||"";
document.getElementById("data").value=musica.data||"";
document.getElementById("nota").value=musica.nota||"";
document.getElementById("observacoes").value=musica.observacoes||"";

}

document
.getElementById("formEditar")
.addEventListener("submit",function(e){

e.preventDefault();

PortalStorage.atualizar("musicas",id,{

titulo:document.getElementById("titulo").value,

artista:document.getElementById("artista").value,

album:document.getElementById("album").value,

genero:document.getElementById("genero").value,

data:document.getElementById("data").value,

nota:document.getElementById("nota").value,

observacoes:document.getElementById("observacoes").value

});

window.location="/musicas/{{ usuario|lower }}";

});

</script>

</body>

</html>
