<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eventos</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<script src="{{ url_for('static', filename='js/portal_storage.js') }}"></script>

<style>

.lista{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(320px,1fr));

gap:20px;

margin-top:30px;

}

.cardEvento{

background:rgba(255,255,255,.08);

border-radius:16px;

padding:20px;

border:1px solid rgba(255,255,255,.08);

color:white;

}

.cardEvento h2{

margin-bottom:15px;

font-size:22px;

}

.cardEvento p{

margin:6px 0;

font-size:15px;

}

.acoes{

display:flex;

gap:10px;

margin-top:18px;

}

.acoes button{

flex:1;

}

</style>

</head>

<body class="login">

<div class="overlay">

<div class="glass" style="width:1200px;max-width:95%;">

<img
class="logo"
src="{{ url_for('static', filename='img/logo.svg') }}">

<div class="portal">

PORTAL

</div>

<h1>

Eventos

</h1>

<p>

Momentos especiais registrados por vocês.

</p>

<div style="display:flex;justify-content:space-between;gap:15px;">

<button
onclick="window.location='/dashboard/{{ usuario|lower }}'"
style="background:#444;color:white;">

Dashboard

</button>

<button
onclick="window.location='/novo-evento/{{ usuario|lower }}'">

Novo Evento

</button>

</div>

<div
class="lista"
id="lista">

</div>

</div>

</div>

<script>

const usuario="{{ usuario|lower }}";

function carregar(){

const lista=document.getElementById("lista");

lista.innerHTML="";

const eventos=PortalStorage.listar("eventos");

if(eventos.length===0){

lista.innerHTML="<p style='color:white'>Nenhum evento cadastrado.</p>";

return;

}

eventos.forEach(e=>{

const card=document.createElement("div");

card.className="cardEvento";

card.innerHTML=`

<h2>${e.titulo}</h2>

<p><strong>Categoria:</strong> ${e.categoria}</p>

<p><strong>Local:</strong> ${e.local}</p>

<p><strong>Data:</strong> ${e.data}</p>

<p><strong>Hora:</strong> ${e.hora}</p>

<p><strong>Valor:</strong> ${e.valor}</p>

<p>${e.observacoes || ""}</p>

<div class="acoes">

<button onclick="editar(${e.id})">

Editar

</button>

<button
style="background:#a22;color:white;"
onclick="remover(${e.id})">

Excluir

</button>

</div>

`;

lista.appendChild(card);

});

}

function editar(id){

window.location=`/editar-evento/${id}/${usuario}`;

}

function remover(id){

if(!confirm("Deseja excluir este evento?")) return;

PortalStorage.remover("eventos",id);

carregar();

}

carregar();

</script>

</body>

</html>
