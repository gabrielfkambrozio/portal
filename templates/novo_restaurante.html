<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Novo Restaurante</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/portal_storage.js') }}"></script>

</head>

<body class="login">

<div class="overlay">

<div class="glass">

<img
class="logo"
src="{{ url_for('static', filename='img/logo.svg') }}">

<div class="portal">

PORTAL

</div>

<h1>

Novo Restaurante

</h1>

<p>

Cadastre um restaurante especial.

</p>

<form id="formRestaurante">

<input
type="text"
id="nome"
placeholder="Nome do restaurante"
required>

<input
type="text"
id="cidade"
placeholder="Cidade"
required>

<input
type="text"
id="tipo"
placeholder="Tipo de culinária">

<div style="display:flex;gap:15px;">

<input
type="date"
id="data"
style="flex:1;">

<input
type="number"
id="nota"
min="0"
max="10"
step="0.5"
placeholder="Nota"
style="flex:1;">

</div>

<input
type="number"
step="0.01"
id="valor"
placeholder="Valor gasto">

<textarea
id="observacoes"
placeholder="Observações..."
style="
height:140px;
resize:none;
padding:18px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
outline:none;
"></textarea>

<div style="display:flex;gap:15px;">

<button
type="button"
onclick="window.location='/restaurantes/{{ usuario|lower }}';"
style="flex:1;background:#444;color:white;">

Cancelar

</button>

<button
type="submit"
style="flex:2;">

Salvar Restaurante

</button>

</div>

</form>

</div>

</div>

<script>

document
.getElementById("formRestaurante")
.addEventListener("submit",function(e){

e.preventDefault();

PortalStorage.adicionar("restaurantes",{

nome:document.getElementById("nome").value,

cidade:document.getElementById("cidade").value,

tipo:document.getElementById("tipo").value,

data:document.getElementById("data").value,

nota:document.getElementById("nota").value,

valor:document.getElementById("valor").value,

observacoes:document.getElementById("observacoes").value

});

window.location="/restaurantes/{{ usuario|lower }}";

});

</script>

</body>

</html>
